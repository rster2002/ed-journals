name: Tests allow unknown

on:
  push:
    branches:
      - "master"
      - "ci"
  pull_request:
    branches:
      - "master"
      - "ci"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: https://github.com/actions/checkout@4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --features allow-unknown --verbose
