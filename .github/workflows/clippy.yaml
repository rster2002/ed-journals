name: "Clippy check"

on:
  push:
    branches:
      - "master"
      - "ci"
  pull_request:
    branches:
      - "master"
      - "ci"

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@4
      - name: Run Clippy
        run: cargo clippy --all-features
